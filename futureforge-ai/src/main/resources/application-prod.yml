server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL}}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope: profile, email

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:bcawithmanish0008@gmail.com}
    password: ${MAIL_PASSWORD:lryzrevyrjcsraxe}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:FutureForgeAI2024SecretKeyForJWTTokenGenerationAndValidationMustBeLongEnough256Bits}
  access-token-expiration: 86400000    # 24 hours
  refresh-token-expiration: 604800000  # 7 days

groq:
  api:
    key: ${GROQ_API_KEY:YOUR_GROQ_API_KEY}
    url: https://api.groq.com/openai/v1/chat/completions
    model: gpt-oss-20b

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:3000,http://localhost:5173}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:https://futureforge-ui.vercel.app/oauth2/redirect}
